<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - 리더십 분석 시스템</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { display: block; padding: 0; }
        .main-content { margin-left: 0; padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 1.5rem; }
        
        .user-info-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 8px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .user-info-box .username { font-weight: 600; color: #333; font-size: 0.9rem; }
        .logout-btn {
            padding: 6px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        /* Summary Bar */
        .summary-bar {
            background: white;
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.85rem;
            color: #555;
        }
        .summary-bar .summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .summary-bar .summary-value {
            font-weight: 600;
            color: #333;
        }
        .summary-bar .summary-divider {
            width: 1px;
            height: 20px;
            background: #ddd;
        }
        
        /* Period Tabs */
        .period-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .period-tab {
            padding: 8px 20px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .period-tab:hover { border-color: #667eea; }
        .period-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
            min-width: 150px;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 900px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart-card h3 {
            color: #333;
            margin: 0 0 16px 0;
            font-size: 1rem;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        
        /* Full width chart */
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        
        /* Table */
        .recent-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .recent-section h3 {
            color: #333;
            margin: 0 0 16px 0;
            font-size: 1rem;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        .recent-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .recent-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: 500;
        }
        .recent-table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .recent-table tr:hover { background: #f8f9ff; }
        
        .trait-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .trait-badge.warning {
            background: linear-gradient(135deg, #f5576c, #fa709a);
        }
        
        .text-preview {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #666;
        }
        
        .no-data {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <a href="/" class="nav-back">← 개별 분석으로 돌아가기</a>
        
        <header class="header">
            <h1>대시보드</h1>
            <div class="user-info-box">
                <span class="username">{{ username }}</span>
                <button class="logout-btn" id="logoutBtn">로그아웃</button>
            </div>
        </header>
        
        <!-- Summary Bar (한 줄 요약) -->
        <div class="summary-bar" id="summaryBar">
            <div class="summary-item">
                <span>총 분석:</span>
                <span class="summary-value" id="sumTotal">-</span>
                <span>건</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span>일 평균</span>
                <span class="summary-value" id="sumAvg">-</span>
                <span>건</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span>어제</span>
                <span class="summary-value" id="sumYesterday">-</span>
                <span>건</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span>주요 Trait:</span>
                <span class="summary-value" id="sumTopTrait">-</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span>Positive:</span>
                <span class="summary-value" id="sumPositive">-</span>
                <span>%</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span>부정 감지:</span>
                <span class="summary-value" id="sumNegative">-</span>
                <span>건</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span>마지막:</span>
                <span class="summary-value" id="sumLast">-</span>
            </div>
        </div>
        
        <!-- Period Tabs -->
        <div class="period-tabs">
            <div class="period-tab" data-period="day">일</div>
            <div class="period-tab" data-period="week">주</div>
            <div class="period-tab" data-period="month">월</div>
            <div class="period-tab" data-period="year">연</div>
            <div class="period-tab active" data-period="all">전체</div>
        </div>
        
        <!-- Filter Tabs -->
        <div class="filter-tabs" id="filterTabs">
            <select id="departmentFilter" class="filter-select">
                <option value="">전체 부서</option>
            </select>
            <select id="positionFilter" class="filter-select">
                <option value="">전체 직급</option>
            </select>
            <select id="jobLevelFilter" class="filter-select">
                <option value="">전체 직급(역할)</option>
            </select>
            <button class="btn btn-small" id="applyFilterBtn">필터 적용</button>
            <button class="btn btn-small btn-secondary" id="clearFilterBtn">초기화</button>
        </div>
        
        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Trait 분포 (Radar)</h3>
                <canvas id="traitRadarChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Trait 비율 (%)</h3>
                <canvas id="traitPercentageChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Positive / Negative</h3>
                <canvas id="posNegChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>부정 Trait 감지</h3>
                <canvas id="negTraitChart"></canvas>
            </div>
            <div class="chart-card full-width">
                <h3>Trait 추이</h3>
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        
        <!-- Recent Table -->
        <div class="recent-section">
            <h3>최근 분석 결과</h3>
            <table class="recent-table">
                <thead>
                    <tr>
                        <th style="width:50px;">#</th>
                        <th style="width:80px;">사용자</th>
                        <th>입력 텍스트</th>
                        <th style="width:120px;">Primary Trait</th>
                        <th style="width:90px;">시간</th>
                    </tr>
                </thead>
                <tbody id="recentBody"></tbody>
            </table>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch('/api/auth/logout', {method: 'POST'});
            window.location.href = '/login';
        });
    </script>
</body>
</html>
